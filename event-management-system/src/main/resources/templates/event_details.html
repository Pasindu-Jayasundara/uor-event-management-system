<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details</title>
    <link rel="stylesheet" th:href="@{/css/event_details.css}">
</head>
<body>

<div class="container">

    <div class="left-container">

        <div class="main-img">
            <img th:src="${event.image}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;"/>
            <p th:text="${event.title}"></p>
        </div>


        <div class="evdetails">
            <div class="section-1">

                <div class="evitem">


                    <img th:src="@{/icon/homepage/evIcon.svg}">

                    <span>Date</span>
                    <p th:text="${#temporals.format(event.eventDate, 'EEEE, dd MMM yyyy')}"></p>

                </div>

                <div class="evitem">

                    <img src="./icon/homepage/Icon5.svg">
                    <span>Time</span>
                    <p>
                        <span th:text="${#temporals.format(event.startTime, 'hh:mm a')}"></span>
                        –
                        <span th:text="${#temporals.format(event.endTime, 'hh:mm a')}"></span>
                    </p>


                </div>

                <div class="evitem">

                    <img src="./icon/homepage/evIcon.svg">
                    <span>Location</span>
                    <p th:text="${event.eventLocation}"></p>

                </div>

                <div class="evitem">

                    <img src="./icon/homepage/Icontime.svg">
                    <span>Capacity</span>
                    <p>
                        <span th:text="${event.allRegisteredCount}"></span>
                        /
                        <span th:text="${event.spots}"></span>
                        registered
                    </p>

                </div>


            </div>

            <div class="desc">

                <h2>About this event</h2>
                <p th:text="${event.eventDescription}"></p>

                <img th:src="@{/icon/homepage/evIcon2.svg}">
                <span>Location</span>
                <p>Main Auditorium</p>

            </div>


        </div>

        <div class="files-details">
            <div class="file-title">
                <img th:src="@{/icon/homepage/Icon3.svg}">
                <span>Event Files & Resources</span>
            </div>

            <div class="filename">

                <p>📄 Summit_Schedule_2026.pdf</p>
            </div>

            <div class="filename">
                <p> 📄 Speaker_Bios.pdf</p>
            </div>

        </div>


    </div>


    <div class="right-container">


        <div class="right-section-1">
            <div class="already-registered" th:if="${isRegistered}"> <img th:src="@{/icon/homepage/correct.svg}"
                                                 style="position: absolute; top: 15px; left: 5px;">
                <span class="register-title">You are Registerd </span>
                <p class="register-title2">Check your dashboard for updates</p>

            </div>
            <button class="register-btn" th:if="${!isRegistered}"> Register</button>


        </div>


    </div>


</div>


</body>
</html>
