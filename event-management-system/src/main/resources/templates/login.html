<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<form method="post" th:action="@{/login}">

    <div>
        <label>Email:</label>
        <input type="text" name="email" />
    </div>

    <div>
        <label>Password:</label>
        <input type="password" name="password" />
    </div>

    <button type="submit">Login</button>

</form>

</body>
</html>
