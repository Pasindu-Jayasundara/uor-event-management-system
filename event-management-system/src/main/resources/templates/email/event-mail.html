<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>

<body style="font-family: Arial; background-color:#f5f5f5; padding:20px;">

<div style="max-width:600px; margin:auto; background:white; border-radius:10px; overflow:hidden;">

    <!-- Header -->
    <div style="background:#b91c1c; color:white; padding:15px; text-align:center;">
        <h2>Event Notification</h2>
    </div>

    <!-- Body -->
    <div style="padding:20px;">

        <h3 th:text="${eventTitle}">Event Title</h3>

        <p th:text="${message}">Message here</p>

        <hr>

        <p><strong>Date:</strong> <span th:text="${eventDate}"></span></p>
        <p><strong>Location:</strong> <span th:text="${eventLocation}"></span></p>

    </div>

    <!-- Footer -->
    <div style="background:#eee; padding:10px; text-align:center; font-size:12px;">
        © Event Management System
    </div>

</div>

</body>
</html>
