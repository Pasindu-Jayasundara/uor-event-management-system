<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://unpkg.com/tailwindcss@1.9.6/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-10 flex items-center justify-center min-h-screen">
    <div class="bg-white p-6 rounded-lg shadow">
        <div>
            <h1 class="text-2xl font-bold mb-2">Create New Event</h1>
            <p class="text-gray-600 mb-7">Fill the details for the new event</p>
        </div>

       <div class="flex space-x-8 border-b text-gray-400 text-sm font-medium">
           <!-- Active Tab -->
           <div class="flex space-x-8 border-b text-gray-400 text-sm font-medium">
               <button class="pb-3 border-b-2 border-red-800 text-red-800 flex items-center gap-2">
                   <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                       <path d="M7 12.8333C10.2217 12.8333 12.8333 10.2217 12.8333 7C12.8333 3.77833 10.2217 1.16667 7 1.16667C3.77833 1.16667 1.16667 3.77833 1.16667 7C1.16667 10.2217 3.77833 12.8333 7 12.8333Z"
                             stroke="#C10007" stroke-width="1.2"/>
                       <path d="M7 6.41667V10.5" stroke="#C10007" stroke-width="1.2" stroke-linecap="round"/>
                       <path d="M7 4.08333H7.00583" stroke="#C10007" stroke-width="2" stroke-linecap="round"/>
                   </svg>
                   Basic Info
               </button>

           </div>

           <button class="pb-3 flex items-center gap-2 text-gray-400 hover:text-red-800">
               <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                   <g clip-path="url(#clip0_1_797)">
                       <path d="M8.75 1.16675H3.5C3.19058 1.16675 2.89383 1.28966 2.67504 1.50846C2.45625 1.72725 2.33333 2.024 2.33333 2.33341V11.6667C2.33333 11.9762 2.45625 12.2729 2.67504 12.4917C2.89383 12.7105 3.19058 12.8334 3.5 12.8334H10.5C10.8094 12.8334 11.1062 12.7105 11.325 12.4917C11.5437 12.2729 11.6667 11.9762 11.6667 11.6667V4.08341L8.75 1.16675Z"
                             stroke="currentColor" stroke-width="1.16667" stroke-linecap="round" stroke-linejoin="round"/>
                       <path d="M8.16667 1.16675V3.50008C8.16667 3.8095 8.28958 4.10625 8.50838 4.32504C8.72717 4.54383 9.02392 4.66675 9.33333 4.66675H11.6667"
                             stroke="currentColor" stroke-width="1.16667" stroke-linecap="round" stroke-linejoin="round"/>
                       <path d="M5.83333 5.25H4.66667" stroke="currentColor" stroke-width="1.16667" stroke-linecap="round" stroke-linejoin="round"/>
                       <path d="M9.33333 7.58325H4.66667" stroke="currentColor" stroke-width="1.16667" stroke-linecap="round" stroke-linejoin="round"/>
                       <path d="M9.33333 9.91675H4.66667" stroke="currentColor" stroke-width="1.16667" stroke-linecap="round" stroke-linejoin="round"/>
                   </g>
                   <defs>
                       <clipPath id="clip0_1_797">
                           <rect width="14" height="14" fill="white"/>
                       </clipPath>
                   </defs>
               </svg>
               Details
           </button>

           <button class="pb-3 flex items-center gap-2 text-gray-400 hover:text-red-800">

               <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                   <path d="M4.66667 7.58333L9.91667 2.33333C10.6625 1.5875 11.8333 1.5875 12.5792 2.33333C13.325 3.07917 13.325 4.25 12.5792 4.99583L6.75 10.825C5.62917 11.9458 3.85 11.9458 2.72917 10.825C1.60833 9.70417 1.60833 7.925 2.72917 6.80417L8.16667 1.36667"
                         stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
               </svg>
               Files
           </button>

       </div>
        <!-- Event Title -->
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Event Title </label>
                <input type="text" placeholder="e.g. Annual Tech Innovation Summit 2026"
                   class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-red-400 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Short Description</label>
                <textarea placeholder="Brief description shown in event cards"
                          class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-red-400 outline-none"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4.66667 1.16675V3.50008" stroke="#C10007" stroke-width="1.2" stroke-linecap="round"/>
                            <path d="M9.33333 1.16675V3.50008" stroke="#C10007" stroke-width="1.2" stroke-linecap="round"/>
                            <path d="M2.91667 2.33325H11.0833C11.7277 2.33325 12.25 2.85559 12.25 3.49992V11.6666C12.25 12.3109 11.7277 12.8333 11.0833 12.8333H2.91667C2.27233 12.8333 1.75 12.3109 1.75 11.6666V3.49992C1.75 2.85559 2.27233 2.33325 2.91667 2.33325Z"
                                  stroke="#C10007" stroke-width="1.2"/>
                            <path d="M1.75 5.83325H12.25" stroke="#C10007" stroke-width="1.2"/>
                        </svg>

                        <label class="text-sm font-medium">Date</label>
                    </div>
                    <input type="date" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-red-400 outline-none">
                </div>

                <div>

                    <el-dropdown class="inline-block">
                        <button class="inline-flex w-full justify-center gap-x-1.5 rounded-md bg-white/10 px-3 py-2 text-sm font-semibold text-white inset-ring-1 inset-ring-white/5 hover:bg-white/20">
                            Options
                            <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="-mr-1 size-5 text-gray-400">
                                <path d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd" />
                            </svg>
                        </button>

                        <el-menu anchor="bottom end" popover class="w-56 origin-top-right rounded-md bg-gray-800 outline-1 -outline-offset-1 outline-white/10 transition transition-discrete [--anchor-gap:--spacing(2)] data-closed:scale-95 data-closed:transform data-closed:opacity-0 data-enter:duration-100 data-enter:ease-out data-leave:duration-75 data-leave:ease-in">
                            <div class="py-1">
                                <a href="#" class="block px-4 py-2 text-sm text-gray-300 focus:bg-white/5 focus:text-white focus:outline-hidden">Account settings</a>
                                <a href="#" class="block px-4 py-2 text-sm text-gray-300 focus:bg-white/5 focus:text-white focus:outline-hidden">Support</a>
                                <a href="#" class="block px-4 py-2 text-sm text-gray-300 focus:bg-white/5 focus:text-white focus:outline-hidden">License</a>
                                <form action="#" method="POST">
                                    <button type="submit" class="block w-full px-4 py-2 text-left text-sm text-gray-300 focus:bg-white/5 focus:text-white focus:outline-hidden">Sign out</button>
                                </form>
                            </div>
                        </el-menu>
                    </el-dropdown>


                    <!--<input type="text" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-red-400 outline-none">-->
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M7 12.8333C10.2217 12.8333 12.8333 10.2217 12.8333 7C12.8333 3.77833 10.2217 1.16667 7 1.16667C3.77833 1.16667 1.16667 3.77833 1.16667 7C1.16667 10.2217 3.77833 12.8333 7 12.8333Z"
                                  stroke="#C10007" stroke-width="1.2"/>
                            <path d="M7 4.08325V7.33325L9.33333 8.49992"
                                  stroke="#C10007" stroke-width="1.2" stroke-linecap="round"/>
                        </svg>

                        <label class="text-sm font-medium">Time</label>
                    </div>
                    <input type="time" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-red-400 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">End Time</label>
                    <input type="time" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-red-400 outline-none">
                </div>
            </div>

            <div>
                <div class="flex items-center gap-2 mb-1">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
                         xmlns="http://www.w3.org/2000/svg">
                        <g clip-path="url(#clip0_1_791)">
                            <path d="M11.6667 5.83341C11.6667 8.746 8.43558 11.7793 7.35058 12.7162C7.2495 12.7922 7.12646 12.8333 7 12.8333C6.87353 12.8333 6.75049 12.7922 6.64942 12.7162C5.56442 11.7793 2.33333 8.746 2.33333 5.83341C2.33333 4.59574 2.825 3.40875 3.70017 2.53358C4.57534 1.65841 5.76232 1.16675 7 1.16675C8.23768 1.16675 9.42466 1.65841 10.2998 2.53358C11.175 3.40875 11.6667 4.59574 11.6667 5.83341Z"
                                  stroke="#FF2056" stroke-width="1.16667"
                                  stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M7 7.58325C7.9665 7.58325 8.75 6.79975 8.75 5.83325C8.75 4.86675 7.9665 4.08325 7 4.08325C6.0335 4.08325 5.25 4.86675 5.25 5.83325C5.25 6.79975 6.0335 7.58325 7 7.58325Z"
                                  stroke="#FF2056" stroke-width="1.16667"
                                  stroke-linecap="round" stroke-linejoin="round"/>
                        </g>
                        <defs>
                            <clipPath id="clip0_1_791">
                                <rect width="14" height="14" fill="white"/>
                            </clipPath>
                        </defs>
                    </svg>

                    <label class="text-sm font-medium">Location</label>
                </div>

                <input type="text"
                       class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-red-400 outline-none"
                       placeholder="e.g. Main Auditorium, Engineering Building">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">

                            <path d="M9.33333 12.25V11.0833C9.33333 10.4645 9.0875 9.871 8.64992 9.43342C8.21233 8.99583 7.61884 8.75 7 8.75H3.5C2.88116 8.75 2.28767 8.99583 1.85009 9.43342C1.4125 9.871 1.16667 10.4645 1.16667 11.0833V12.25"
                                  stroke="#C10007" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

                            <path d="M5.25 6.41667C6.53867 6.41667 7.58333 5.372 7.58333 4.08333C7.58333 2.79467 6.53867 1.75 5.25 1.75C3.96134 1.75 2.91667 2.79467 2.91667 4.08333C2.91667 5.372 3.96134 6.41667 5.25 6.41667Z"
                                  stroke="#C10007" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

                            <path d="M12.8333 12.25V11.0834C12.8329 10.5664 12.6609 10.0642 12.3441 9.65561C12.0274 9.24701 11.5839 8.95518 11.0833 8.82593"
                                  stroke="#C10007" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

                            <path d="M9.33333 1.82593C9.83524 1.95444 10.2801 2.24634 10.5978 2.65561C10.9155 3.06488 11.0879 3.56824 11.0879 4.08634C11.0879 4.60444 10.9155 5.10781 10.5978 5.51708C10.2801 5.92635 9.83524 6.21825 9.33333 6.34676"
                                  stroke="#C10007" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>

                        <label class="text-sm font-medium">Participants</label>
                    </div>
                    <input type="text" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-red-400 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Status</label>
                    <input type="text" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-red-400 outline-none">
                </div>
            </div>

            <div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex items-center gap-2 mb-1">
                    </div>
                </div>
                <div class="flex gap-3">
                    <button class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">Cancel</button>
                    <button class="px-5 py-2 bg-red-800 text-white rounded-lg hover:bg-red-800" th:onclick="sublitForm()"

                    >Create Event</button>
                </div>
            </div>

        </div>

    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function (){
        const tabs = document.querySelectorAll(".flex.space-x-8 button");

        tabs.forEach(tab => {
            tab.addEventListener("click", () => {
                tabs.forEach(t => {
                    t.classList.remove("text-red-800", "border-b-2", "border-red-800");
                    t.classList.add("text-gray-500");
                });

                tab.classList.add("text-red-800", "border-b-2", "border-red-800");
                tab.classList.remove("text-gray-500");
                });
            });
        });

    </script>

    <script>
        function validateForm(containerId){
            let valid = true;
            
            const container = document.addEventListener(containerId);
            const inputs = container.querySelectorAll("input, textarea");

            inputs.forEach(input => {
                if (!input.value.trim()){
                    input.classList.add("border-red-500");
                    valid = false;
                }else {
                    input.classList.remove("border-red-500");
                }
            });

            return valid;
        }
    </script>

    <script>
        function submitForm() {
            if (!validateForm("step1")) {
                alert("Please fill all required fields!");
                return;
            }

            alert("Form submitted successfully!");
        }
    </script>
</body>
</html>
