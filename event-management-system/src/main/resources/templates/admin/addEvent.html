<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AddEvent</title>
    <link rel="stylesheet" th:href="@{/css/admin/addEvent.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
    />


    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
</head>

<body>



<div class="form-container">

    <h2 class="form-title">Create New Event</h2>
    <p class="form-subtitle">Fill in the details to create an event</p>

    <form th:action="@{/admin/add-event}" method="post"
          th:object="${event}">

        <div class="form-group">
            <label>Event Title</label>
            <input type="text" th:field="*{title}" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea th:field="*{eventDescription}"></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Location</label>
                <input type="text" th:field="*{eventLocation}" required>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" th:field="*{eventDate}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Start Time</label>
                <input type="time" th:field="*{startTime}" required>
            </div>

            <div class="form-group">
                <label>End Time</label>
                <input type="time" th:field="*{endTime}" required>
            </div>
        </div>

        <div class="form-group">
            <label>Spots</label>
            <input type="number" th:field="*{spots}" required>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select th:field="*{eventCategory}">
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.category}">
                </option>
            </select>
        </div>



        <div class="form-row checkbox-row">
            <label>
                <input type="checkbox" th:field="*{hasLimit}">
                Has Limit
            </label>

            <label>
                <input type="checkbox" th:field="*{requestApproval}">
                Require Approval
            </label>
        </div>


        <div class="form-group">
            <label>Organizers</label>

            <select id="organizerSelect" name="organizerIds" multiple>
                <option th:each="user : ${users}"
                        th:value="${user.id}"
                        th:text="${user.firstName + ' ' + user.lastName}">
                </option>
            </select>
        </div>

        <div class="form-group">

            <label>Banner Image URL</label>
            <input type="text" th:field="*{image}" placeholder="Paste Cloudinary URL">
        </div>




        <button type="submit" class="btn-submit">Save Event</button>

    </form>
</div>




<script>
    document.addEventListener('DOMContentLoaded', function () {
        new Choices('#organizerSelect', {
            removeItemButton: true,
            searchEnabled: true,
            placeholder: true,
            placeholderValue: 'Select organizers...',
        });
    });
</script>
</body>
</html>
