<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>

<div th:if="${errorMsg}" style="color:red; margin-bottom:10px;">
  <p th:text="${errorMsg}"></p>
</div>

<form method="post" th:action="@{/register}" th:object="${registerDto}">

  <div>
    <label>First Name:</label>
    <input type="text" th:field="*{first_name}" />
  </div>

  <div>
    <label>Last Name:</label>
    <input type="text" th:field="*{last_name}" />
  </div>

  <div>
    <label>Email:</label>
    <input type="email" th:field="*{email}" />
  </div>

  <div>
    <label>Password:</label>
    <input type="password" th:field="*{password}" />
  </div>

  <div>
    <label>NIC:</label>
    <input type="text" th:field="*{nic}" />
  </div>

  <button type="submit">Register</button>

</form>

</body>
</html>
