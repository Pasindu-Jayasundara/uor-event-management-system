<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard</title>

</head>
<body>

<div th:fragment="dashboard">

    <!-- Profile Banner -->
    <div class="profile-banner">
        <div class="profile-banner-inner">
            <div class="profile-left">
                <div class="avatar-circle">
                    <span th:text="${#strings.substring(user.firstName,0,1) + #strings.substring(user.lastName,0,1)}"></span>
                </div>
                <div class="profile-info">
                    <h2  th:text="${user.firstName + ' ' + user.lastName}"></h2>
                    <p th:text="${user.email}"></p>
                </div>
            </div>
            <div class="profile-stats">
                <div class="stat-item">
                    <span class="stat-number yellow" th:text="${registerdcount}">0</span>
                    <span class="stat-label">Registered</span>
                </div>

            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="dashboard-container">

        <!-- Tabs -->
        <div class="tab-nav">

            <!-- ✅ My Registrations -->
            <button class="tab-btn active" data-tab="registrations">
                📅 My Registrations
                <span th:text="${registerdcount}">0</span>
            </button>

            <!-- ✅ My Profile -->
            <button class="tab-btn" data-tab="profile">
                👤 My Profile
            </button>

        </div>
        <div class="tab-divider"></div>

        <!-- Tab 1: My Registrations -->
        <div class="tab-content active" id="tab-registrations">

            <div class="registered-events">

                <div th:each="reg : ${registeredEvents}" class="event-row">

                    <!-- 📷 Image -->
                    <img th:src="${reg.event.image}" class="event-img"/>

                    <!-- 📄 Info -->
                    <div class="event-info">
                        <h3 th:text="${reg.event.title}"></h3>

                        <div class="event-meta">

                            <!-- 📅 Date -->
                            <span>
        📅
        <span th:text="${#temporals.format(reg.event.eventDate, 'dd MMM yyyy')}"></span>
    </span>

                            <!-- ⏰ Time -->
                            <span>
        ⏰
        <span th:text="${#temporals.format(reg.event.startTime, 'hh:mm a')}"></span>
        -
        <span th:text="${#temporals.format(reg.event.endTime, 'hh:mm a')}"></span>
    </span>

                            <!-- 📍 Location -->
                            <span>
        📍
        <span th:text="${reg.event.eventLocation}"></span>
    </span>

                        </div>
                    </div>

                    <!-- 🎯 Actions -->
                    <div class="event-actions">

                        <!-- STATUS BADGE -->
                        <span class="status-badge"
                              th:text="${reg.status}"
                              th:classappend="' ' + ${#strings.toLowerCase(reg.status)}">
        </span>

                        <!-- ❌ CANCEL BUTTON -->
                        <form th:action="@{/event/{id}/userdashboadcancel(id=${reg.event.id})}" method="post">

                            <button type="submit"
                                    class="cancel-btn"
                                    onclick="return confirm('❌ Are you sure to cancel this event?')"
                                    th:if="${reg.status.name() != 'REJECTED'}">

                                ❌ Cancel

                            </button>

                        </form>

                    </div>

                </div>



            </div>



        </div>



        <!-- Tab 3: My Profile -->
        <div class="tab-content" id="tab-profile">

            <!-- PROFILE FORM -->
            <form th:action="@{/user/update-profile}" method="post" class="profile-card">
                <div th:if="${error}" class="error-msg" th:text="${error}"></div>
                <div th:if="${success}" class="success-msg" th:text="${success}"></div>

                <!-- Header -->
                <div class="profile-card-header">
                    <div class="profile-avatar-blue"
                         th:text="${#strings.substring(user.firstName,0,1) + #strings.substring(user.lastName,0,1)}">
                    </div>

                    <div>
                        <div class="profile-card-name"
                             th:text="${user.firstName + ' ' + user.lastName}">
                        </div>
                    </div>
                </div>

                <hr class="profile-divider"/>

                <!-- First Name -->
                <div class="profile-detail-row">
                    <span class="detail-label">First Name</span>
                    <input type="text" name="firstName"
                           th:value="${user.firstName}" required/>
                </div>

                <hr class="profile-divider"/>

                <!-- Last Name -->
                <div class="profile-detail-row">
                    <span class="detail-label">Last Name</span>
                    <input type="text" name="lastName"
                           th:value="${user.lastName}" required/>
                </div>

                <hr class="profile-divider"/>

                <!-- Email (readonly) -->
                <div class="profile-detail-row">
                    <span class="detail-label">Email</span>
                    <input type="email" th:value="${user.email}" readonly/>
                </div>

                <hr class="profile-divider"/>

                <!-- Department -->
                <div class="profile-detail-row">
                    <span class="detail-label">Department</span>
                    <input type="text" name="department"
                           th:value="${profile.department.department}" readonly/>
                </div>

                <hr class="profile-divider"/>

                <!-- Year -->
                <div class="profile-detail-row">
                    <span class="detail-label">Year</span>
                    <input type="text" name="year"
                           th:value="${profile.studyYear.year}" readonly/>
                </div>

                <hr class="profile-divider"/>

                <!-- SAVE BUTTON -->
                <button type="submit" class="save-btn">
                    💾 Save Changes
                </button>

            </form>

            <div class="profile-card password-section">

                <div class="profile-card-header">
                    <div class="profile-card-name">🔐 Change Password</div>
                </div>

                <hr class="profile-divider"/>

                <form th:action="@{/user/change-password}" method="post">

                    <!-- Old Password -->
                    <div class="profile-detail-row">
                        <span class="detail-label">Old Password</span>
                        <input type="password" name="oldPassword"
                               placeholder="Enter old password" required/>
                    </div>

                    <hr class="profile-divider"/>

                    <!-- New Password -->
                    <div class="profile-detail-row">
                        <span class="detail-label">New Password</span>
                        <input type="password" name="newPassword"
                               placeholder="Enter new password" required/>

                    </div>
                    <small class="password-hint">
                        Must be at least 6 characters with uppercase & lowercase letters
                    </small>

                    <hr class="profile-divider"/>

                    <!-- BUTTON -->
                    <button type="submit" class="save-btn">
                        🔄 Update Password
                    </button>

                </form>

            </div>

        </div>

    </div><!-- end dashboard-container -->

    <script th:src="@{/js/user/dashboard.js}"></script>

</div>

</body>
</html>
