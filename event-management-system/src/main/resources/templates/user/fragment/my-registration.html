<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" >
<head>
    <meta charset="UTF-8">
    <title>My Registration Fragment</title>
</head>
<body>

<div th:fragment="my-registration">

    <div class="page-wrap">
        <!-- Hero -->
        <div class="hero">
            <h1>My Event Registrations</h1>
        </div>


        <div class="toolbar">
            <div class="search-wrap">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" placeholder="Search events..." id="searchInput" oninput="filterCards()">
            </div>
            <div class="filters">
                <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
                <button class="filter-btn" onclick="setFilter('upcoming',this)">Upcoming</button>
                <button class="filter-btn" onclick="setFilter('past',this)">Past</button>
                <button class="filter-btn" onclick="setFilter('cancelled',this)">Cancelled</button>
            </div>
        </div>

            <div class="events-list" id="eventsList">

                <div class="event-card" data-status="upcoming" data-title="annual tech innovation summit 2026">
                    <img class="event-thumb" src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=300&q=80" alt="Tech Summit">
                    <div class="event-body">
                        <div class="event-top">
                            <div class="event-title">Annual Tech Innovation Summit 2026</div>
                            <div class="reg-id">Reg ID<span>REG20012001</span></div>
                        </div>
                        <div class="tags">
                            <span class="tag category">Technology</span>
                            <span class="tag confirmed">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>
            Confirmed
          </span>
                        </div>
                        <div class="event-meta">
          <span class="meta-item date">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            Sun, Mar 15, 2026
          </span>
                            <span class="meta-item time">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            09:00
          </span>
                            <span class="meta-item loc">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            Main Auditorium, Engineering Building
          </span>
                        </div>
                        <div class="event-actions">
                            <button class="btn btn-ticket">
                                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 9a1 1 0 0 1 1-1h18a1 1 0 0 1 1 1v2a2 2 0 0 0 0 4v2a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-2a2 2 0 0 0 0-4V9z"/></svg>
                                View Ticket
                            </button>
                            <button class="btn btn-edit">
                                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                Unregister
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
</div>

</body>
</html>
